services:
  postgres_test:
    image: pgvector/pgvector:pg16
    container_name: muminmate_postgres_test
    environment:
      POSTGRES_USER: muminmate
      POSTGRES_PASSWORD: muminmate
      POSTGRES_DB: muminmate_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U muminmate -d muminmate_test"]
      interval: 5s
      timeout: 5s
      retries: 5
