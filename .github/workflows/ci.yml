name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --group dev

      - name: ruff check
        run: uv run ruff check backend/

      - name: ruff format check
        run: uv run ruff format --check backend/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: muminmate
          POSTGRES_PASSWORD: muminmate
          POSTGRES_DB: muminmate_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_USER: muminmate
      DB_PASSWORD: muminmate
      DB_HOST: localhost
      DB_PORT: 5433
      DB_NAME: muminmate
      DATABASE_URL: postgresql+asyncpg://muminmate:muminmate@localhost:5433/muminmate
      TEST_DATABASE_URL: postgresql+asyncpg://muminmate:muminmate@localhost:5433/muminmate_test
      SECRET_KEY: ci-test-secret-key-not-for-production

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --group dev

      - name: Run migrations (validates migration files)
        run: |
          # Create the app DB for alembic (test suite uses its own DB directly)
          PGPASSWORD=muminmate psql -h localhost -p 5433 -U muminmate -d muminmate_test -c "CREATE DATABASE muminmate;" || true
          uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest --cov=backend --cov-report=xml -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: muminmate:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max