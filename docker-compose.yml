services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: muminmate_postgres
    environment:
      POSTGRES_USER: muminmate
      POSTGRES_PASSWORD: muminmate
      POSTGRES_DB: muminmate
    ports:
      - "5433:5432"
    volumes:
      - muminmate_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U muminmate -d muminmate"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  muminmate_pgdata: